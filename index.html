<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mangalam HDPE Pipes | Premium Infrastructure Solutions</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Loader for sections */
        .section-loader { min-height: 100px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <!-- Modular Sections Placeholder -->
    <div id="header-container"></div>
    
    <main id="main-content">
        <div id="hero-container"></div>
        <div id="specs-container"></div>
        <div id="features-container"></div>
        <div id="faq-container"></div>
        <div id="applications-container"></div>
        <div id="process-container"></div>
        <div id="testimonials-container"></div>
        <div id="portfolio-container"></div>
        <div id="resources-container"></div>
        <div id="contact-container"></div>
    </main>

    <div id="footer-container"></div>

    <!-- Script to load modular parts -->
    <script>
        async function loadSection(id, path) {
            try {
                const response = await fetch(path);
                const html = await response.text();
                document.getElementById(id).innerHTML = html;
            } catch (err) {
                console.error('Failed to load section:', path, err);
            }
        }

        // Initialize loading
        window.addEventListener('DOMContentLoaded', async () => {
            await loadSection('header-container', 'sections/header.html');
            await loadSection('hero-container', 'sections/hero.html');
            await loadSection('specs-container', 'sections/specs.html');
            await loadSection('features-container', 'sections/features.html');
            await loadSection('faq-container', 'sections/faq.html');
            await loadSection('applications-container', 'sections/applications.html');
            await loadSection('process-container', 'sections/process.html');
            await loadSection('testimonials-container', 'sections/testimonials.html');
            await loadSection('portfolio-container', 'sections/portfolio.html');
            await loadSection('resources-container', 'sections/resources.html');
            await loadSection('contact-container', 'sections/contact.html');
            await loadSection('footer-container', 'sections/footer.html');





            
            // Re-initialize scripts after content is loaded
            if (window.initApp) window.initApp();
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
